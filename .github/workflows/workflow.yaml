
name: CI

on:
  workflow_dispatch:

jobs:
  job1:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - run: |
          echo ${{ github.workspace }}
          echo $GITHUB_WORKSPACE

      
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with: 
            python-version: '3.12'

      - name: Confirm python version
        run:
              python --version
            

      
      - name: Cleandata
        run: |
          pwd
          ls -al
          pwd
          cd ModelCleaning
          pip install pandas
          python Cleandata.py
          
      - name: train_test
        run: |
          pip install scikit-learn joblib
          python ModelCleaning/train_test.py
          


