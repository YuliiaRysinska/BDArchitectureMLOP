name: PublishImage

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'Dockerfile'

jobs:

  publish_images:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Printing Folders
        run: |
          ls

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.MLOP_userName }}
          password: ${{ secrets.MLOP }}

      - name: Build image
        run: |
          docker build -f ModelCleaning/Dockerfile -t iuy.nickolaencko/modelbuild:latest .

      - name: Push image to Docker Hub
        run: |
          docker build -f ModelCleaning/Dockerfile -t iuy.nickolaencko/modelbuild:latest .