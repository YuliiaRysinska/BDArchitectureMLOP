name: PublishImage 

on: 
  workflow_dispatch:

  #this will only run if Dockerfile changes after a push 
  push: 
    branches: 
      - main 
    paths: 
      - 'Dockerfile' 
  

jobs: 

  publish_images: 

    runs-on: ubuntu-latest 

    steps: 

      - name: Checkout Code 

        uses: actions/checkout@v6

      - name: Printing Folders 
  
        run: 

        ls 

      - name: Login to Docker 

        uses: docker/login-action@v1 

        with: 

          username: ${{secrets.MLOP}} 

          password: ${{secrets.MLOP_userName}} 

      - name: build image 

        run:   docker build . -t  ${{MLOP_userName}}

      - name: push image to docker hub 

        run: | 

          docker push iuy.nickolaencko/modelbuild:latest 

 

 
