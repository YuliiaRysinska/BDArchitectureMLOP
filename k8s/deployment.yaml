apiVersion: apps/v1

kind: Deployment

metadata:
  name: flask-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:
        - name: flask-app
          image: iuy.nickolaencko/flaskapp:v1
          imagePullPolicy: Never

          ports:
            - containerPort: 5000